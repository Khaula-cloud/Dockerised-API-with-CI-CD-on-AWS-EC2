name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            git clone https://github.com/Khaula-cloud/Dockerised-API-with-CI-CD-on-AWS-EC2.git || \
              (cd todo-api && git pull)
            cd Dockerised-API-with-CI-CD-on-AWS-EC2
            docker build -t todo-api .
            docker stop todo-api-container || true
            docker rm todo-api-container || true
            docker run -d \
              --name todo-api-container \
              --restart always \
              -p 4000:4000 \
              todo-api
